<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>Tareas — Mekano</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0F0F13;--sur:#13131A;--sur2:#16161F;--sur3:#1E1E2A;--b:#1E1E2A;--b2:#2A2A38;--tx:#E8E8F0;--tx2:#A0A0B8;--tx3:#555568;--ac:#6366F1;--glow:rgba(99,102,241,.3);--gr:#10B981;--rd:#EF4444}
    html,body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh;font-size:15px}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--sur)}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
    #login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,rgba(99,102,241,.12),transparent 70%),var(--bg)}
    .card{background:var(--sur);border:1px solid var(--b2);border-radius:16px;padding:40px 32px;width:100%;max-width:360px;text-align:center}
    .ldot{width:12px;height:12px;border-radius:50%;background:var(--ac);box-shadow:0 0 20px var(--glow);display:inline-block;margin-bottom:12px}
    .lt{font-family:'DM Mono',monospace;font-size:11px;color:var(--ac);letter-spacing:3px;text-transform:uppercase;margin-bottom:6px}
    .ls{font-size:13px;color:var(--tx3);margin-bottom:28px}
    .fbtn{width:100%;padding:14px;border-radius:10px;border:none;cursor:pointer;background:var(--ac);color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    .sbtn{width:100%;padding:12px;border-radius:10px;border:2px dashed var(--b2);cursor:pointer;background:transparent;color:var(--ac);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;margin-bottom:10px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    .sbtn:hover{border-color:var(--ac)}
    .div{display:flex;align-items:center;gap:12px;margin:14px 0;color:var(--tx3);font-size:12px}
    .div::before,.div::after{content:'';flex:1;height:1px;background:var(--b2)}
    .pi{width:100%;background:var(--sur2);border:1px solid var(--b2);color:var(--tx);border-radius:8px;padding:11px 14px;font-family:'DM Sans',sans-serif;font-size:16px;outline:none;transition:border-color .2s;margin-bottom:10px}
    .pi:focus{border-color:var(--ac)}.pi::placeholder{color:var(--tx3)}
    .pb{width:100%;padding:11px;border-radius:8px;border:1px solid var(--b2);background:var(--sur2);color:var(--tx2);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    .pb:hover{border-color:var(--ac);color:var(--tx)}
    .msg{font-size:12px;font-family:'DM Mono',monospace;margin-top:10px;min-height:18px;line-height:1.6;padding:0 4px}
    .msg.e{color:#FCA5A5}.msg.ok{color:var(--gr)}.msg.i{color:var(--tx3)}

    /* Modal overlay para pedir clave antes de registrar Face ID */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;backdrop-filter:blur(4px)}
    .overlay.hide{display:none}
    .modal{background:var(--sur);border:1px solid var(--b2);border-radius:14px;padding:28px 24px;width:100%;max-width:320px;text-align:center}
    .modal-title{font-family:'DM Mono',monospace;font-size:12px;color:var(--ac);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
    .modal-sub{font-size:13px;color:var(--tx3);margin-bottom:20px;line-height:1.5}
    .modal-row{display:flex;gap:8px;margin-bottom:10px}
    .modal-row .pi{margin-bottom:0;flex:1}
    .btn-ok{background:var(--ac);color:#fff;border:none;border-radius:8px;padding:11px 20px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    .btn-cancel{background:none;border:1px solid var(--b2);color:var(--tx3);border-radius:8px;padding:11px 14px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;-webkit-tap-highlight-color:transparent;margin-top:4px;width:100%}
    .btn-cancel:hover{border-color:var(--rd);color:var(--rd)}
    .modal-msg{font-size:12px;font-family:'DM Mono',monospace;color:#FCA5A5;margin-top:8px;min-height:16px}

    #app{display:none}
    .hdr{background:var(--sur);border-bottom:1px solid var(--b);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .hl{display:flex;align-items:center;gap:10px}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--glow)}
    .br2{font-family:'DM Mono',monospace;font-size:12px;color:var(--ac);letter-spacing:2px;text-transform:uppercase}
    .bs{font-family:'DM Mono',monospace;font-size:12px;color:var(--tx3)}
    .hr2{display:flex;align-items:center;gap:10px}
    .sv{font-family:'DM Mono',monospace;font-size:12px;color:var(--gr);opacity:0;transition:opacity .3s}.sv.on{opacity:1}
    .btn{background:var(--ac);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
    .btn.cx{background:var(--sur3);color:var(--tx3)}
    .ob{background:none;border:1px solid var(--b2);color:var(--tx3);border-radius:8px;padding:7px 12px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;-webkit-tap-highlight-color:transparent}
    .ob:hover{border-color:var(--rd);color:var(--rd)}
    .fw{background:var(--sur);border-bottom:1px solid var(--b);padding:14px 24px;display:none}.fw.op{display:block}
    .fr{display:flex;gap:10px;flex-wrap:wrap}
    .fi{background:var(--sur2);border:1px solid var(--b2);color:var(--tx);border-radius:8px;padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s;flex:1;min-width:120px}
    .fi:focus{border-color:var(--ac)}.fi::placeholder{color:var(--tx3)}.fc{max-width:200px;flex:0 0 200px}
    @media(max-width:600px){.fc{max-width:100%;flex:1 1 100%}.fr{flex-direction:column}.ab{width:100%}}
    .ab{background:var(--ac);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent}
    .ab:disabled{background:var(--b2);color:var(--tx3);cursor:not-allowed}
    .ft{padding:16px 24px 0;display:flex;gap:2px;border-bottom:1px solid var(--b)}
    .tab{padding:8px 16px;border-radius:6px 6px 0 0;font-size:13px;cursor:pointer;color:var(--tx3);border-bottom:2px solid transparent;user-select:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    .tab.on{color:var(--tx);font-weight:600;border-bottom-color:var(--ac);background:var(--sur2)}
    .bdg{display:inline-block;background:var(--b2);color:#666;border-radius:10px;padding:1px 7px;font-size:11px;font-family:'DM Mono',monospace;margin-left:5px}
    .tl{padding:12px 24px 60px}
    .em{text-align:center;padding:60px 20px;color:var(--tx3)}
    .ei{font-size:32px;margin-bottom:10px}.et{font-family:'DM Mono',monospace;font-size:13px}
    .ti{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:8px;background:var(--sur2);border-left:3px solid var(--b2);margin-bottom:4px;animation:si .2s ease}
    .ti:hover{background:var(--sur3)}.ti.dn{opacity:.55;border-left-color:var(--b2)!important}
    @keyframes si{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
    .ck{width:22px;height:22px;border-radius:50%;border:2px solid var(--ac);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;color:#fff;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    .ti.dn .ck{background:var(--gr);border-color:var(--gr)}
    .ct{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0}
    .td{flex:1;font-size:14px;min-width:0;word-break:break-word}.ti.dn .td{text-decoration:line-through;color:var(--tx3)}
    .dd{font-family:'DM Mono',monospace;font-size:11px;color:var(--tx3);flex-shrink:0;white-space:nowrap}
    .dl{background:none;border:none;color:var(--rd);cursor:pointer;font-size:15px;padding:2px 6px;opacity:0;flex-shrink:0;-webkit-tap-highlight-color:transparent}
    .ti:hover .dl{opacity:1}
    .ld{text-align:center;padding:60px;color:var(--tx3);font-family:'DM Mono',monospace;font-size:13px}
    @keyframes pu{0%,100%{opacity:1}50%{opacity:.4}}.pu{animation:pu 1.2s infinite}
    .eb{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#FCA5A5;padding:10px 24px;font-size:13px;font-family:'DM Mono',monospace;display:none}.eb.on{display:block}
    @media(max-width:600px){.hdr{padding:12px 16px}.bs{display:none}.tl{padding:8px 12px 60px}.ft{padding:12px 12px 0}.fw{padding:12px 16px}.dd{display:none}}
  </style>
</head>
<body>

<!-- Modal: verificar contraseña antes de registrar Face ID -->
<div class="overlay hide" id="setupModal">
  <div class="modal">
    <div class="modal-title">Verificar identidad</div>
    <div class="modal-sub">Ingresa la contraseña para poder registrar Face ID</div>
    <div class="modal-row">
      <input class="pi" type="password" id="setupPw" placeholder="Contraseña" autocomplete="current-password" onkeydown="if(event.key==='Enter')confirmSetup()"/>
      <button class="btn-ok" onclick="confirmSetup()">OK</button>
    </div>
    <div class="modal-msg" id="setupModalMsg"></div>
    <button class="btn-cancel" onclick="closeSetupModal()">Cancelar</button>
  </div>
</div>

<div id="login">
  <div class="card">
    <div class="ldot"></div>
    <div class="lt">Task Board</div>
    <div class="ls">Mekano Consulting</div>

    <button class="fbtn" id="faceBtn" onclick="doFaceLogin(event)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 3H5a2 2 0 0 0-2 2v4"/><path d="M15 3h4a2 2 0 0 1 2 2v4"/><path d="M9 21H5a2 2 0 0 1-2-2v-4"/><path d="M15 21h4a2 2 0 0 0 2-2v-4"/><circle cx="9" cy="10" r="1"/><circle cx="15" cy="10" r="1"/><path d="M9 15a3 3 0 0 0 6 0"/></svg>
      Entrar con Face ID
    </button>

    <button class="sbtn" id="setupBtn" onclick="openSetupModal()">
      + Registrar Face ID (primera vez)
    </button>

    <div id="fmsg" class="msg i"></div>

    <div class="div">o usa contraseña</div>
    <input class="pi" type="password" id="pw" placeholder="Contraseña" autocomplete="current-password" onkeydown="if(event.key==='Enter')doPw()"/>
    <button class="pb" onclick="doPw()">Entrar con contraseña</button>
    <div id="pmsg" class="msg e"></div>
  </div>
</div>

<div id="app">
  <div class="hdr">
    <div class="hl"><div class="dot"></div><span class="br2">Task Board</span><span class="bs">— Mekano</span></div>
    <div class="hr2">
      <span class="sv" id="sv">● guardado</span>
      <button class="btn" id="tb" onclick="togF()">+ Nueva tarea</button>
      <button class="ob" onclick="doOut()">salir</button>
    </div>
  </div>
  <div class="fw" id="fw">
    <div class="fr">
      <input class="fi fc" id="iC" placeholder="Cliente" maxlength="60"/>
      <input class="fi" id="iD" placeholder="Descripción…" maxlength="300"/>
      <button class="ab" id="ab" onclick="doAdd()" disabled>Agregar ↵</button>
    </div>
  </div>
  <div class="eb" id="eb">⚠ Error de conexión.</div>
  <div class="ft">
    <div class="tab on" id="t-all" onclick="setF('all')">Todas <span class="bdg" id="n-all">0</span></div>
    <div class="tab" id="t-pending" onclick="setF('pending')">Pendientes <span class="bdg" id="n-pending">0</span></div>
    <div class="tab" id="t-done" onclick="setF('done')">Completadas <span class="bdg" id="n-done">0</span></div>
  </div>
  <div class="tl" id="tl"><div class="ld"><div class="pu">Conectando…</div></div></div>
</div>

<script>
const SB='https://mptsavgmubvutjrhlwkh.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1wdHNhdmdtdWJ2dXRqcmhsd2toIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNTQzMjIsImV4cCI6MjA4ODgzMDMyMn0.EL9DIx8U_isZeo7mL_BDMCS-5-Rr4JpleyGx5bQ6slA';
const PW='mekano2025',WK='wa_cred',SS='mk_s';
const H={'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=representation'};

function isOk(){return sessionStorage.getItem(SS)==='1';}
function setOk(){sessionStorage.setItem(SS,'1');}
function clearOk(){sessionStorage.removeItem(SS);}
function showApp(){document.getElementById('login').style.display='none';document.getElementById('app').style.display='block';loadT();}
function showLogin(){document.getElementById('login').style.display='flex';document.getElementById('app').style.display='none';}
function doOut(){clearOk();showLogin();}
function setMsg(t,c){const e=document.getElementById('fmsg');e.textContent=t;e.className='msg '+(c||'i');}

function doPw(){
  const v=document.getElementById('pw').value;
  if(v===PW){document.getElementById('pmsg').textContent='';setOk();showApp();}
  else{document.getElementById('pmsg').textContent='✕ Contraseña incorrecta';document.getElementById('pw').value='';}
}

// ── MODAL: verificar clave antes de registrar Face ID ──
function openSetupModal(){
  document.getElementById('setupPw').value='';
  document.getElementById('setupModalMsg').textContent='';
  document.getElementById('setupModal').classList.remove('hide');
  setTimeout(()=>document.getElementById('setupPw').focus(),100);
}
function closeSetupModal(){
  document.getElementById('setupModal').classList.add('hide');
}
function confirmSetup(){
  const v=document.getElementById('setupPw').value;
  if(v!==PW){
    document.getElementById('setupModalMsg').textContent='✕ Contraseña incorrecta';
    document.getElementById('setupPw').value='';
    document.getElementById('setupPw').focus();
    return;
  }
  // Clave correcta: cerrar modal y lanzar WebAuthn inmediatamente
  closeSetupModal();
  doSetup();
}

// ── WEBAUTHN ──
function b64(b){return btoa(String.fromCharCode(...new Uint8Array(b))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}
function ub64(s){s=s.replace(/-/g,'+').replace(/_/g,'/');while(s.length%4)s+='=';return Uint8Array.from(atob(s),c=>c.charCodeAt(0)).buffer;}

function doSetup(){
  if(!window.PublicKeyCredential){setMsg('Face ID no disponible en este navegador','e');return;}
  setMsg('Esperando Face ID…','i');
  const challenge=crypto.getRandomValues(new Uint8Array(32));
  const userId=crypto.getRandomValues(new Uint8Array(16));
  navigator.credentials.create({publicKey:{
    challenge,
    rp:{name:'Tareas Mekano',id:location.hostname},
    user:{id:userId,name:'pablo',displayName:'Pablo'},
    pubKeyCredParams:[{alg:-7,type:'public-key'},{alg:-257,type:'public-key'}],
    authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required'},
    timeout:60000
  }}).then(cred=>{
    localStorage.setItem(WK,b64(cred.rawId));
    setMsg('✓ Face ID registrado. Ya puedes entrar con el botón de arriba.','ok');
    document.getElementById('faceBtn').style.display='flex';
    document.getElementById('setupBtn').style.display='none';
  }).catch(err=>{
    if(err.name==='NotAllowedError')setMsg('Cancelado. Vuelve a intentarlo.','e');
    else setMsg('Error ('+err.name+'): '+err.message,'e');
  });
}

function doFaceLogin(e){
  if(e)e.preventDefault();
  if(!window.PublicKeyCredential){setMsg('Face ID no disponible','e');return;}
  const stored=localStorage.getItem(WK);
  if(!stored){setMsg('Primero registra tu Face ID con el botón de abajo','e');return;}
  setMsg('Esperando Face ID…','i');
  const challenge=crypto.getRandomValues(new Uint8Array(32));
  navigator.credentials.get({publicKey:{
    challenge,
    rpId:location.hostname,
    allowCredentials:[{type:'public-key',id:ub64(stored)}],
    userVerification:'required',
    timeout:60000
  }}).then(()=>{
    setMsg('','i');setOk();showApp();
  }).catch(err=>{
    if(err.name==='NotAllowedError')setMsg('Face ID cancelado o no reconocido','e');
    else setMsg('Error ('+err.name+'): '+err.message,'e');
  });
}

// ── SUPABASE ──
let TR=[],CF='all';
const PAL=['#6366F1','#EC4899','#14B8A6','#F97316','#8B5CF6','#EF4444','#0EA5E9','#84CC16','#F43F5E','#A78BFA'],CC={};
const gc=c=>{if(!CC[c])CC[c]=PAL[Object.keys(CC).length%PAL.length];return CC[c];};
const api=async(p,o={})=>{const r=await fetch(SB+p,{...o,headers:{...H,...(o.headers||{})}});if(!r.ok)throw new Error(await r.text());return r.status===204?null:r.json();};
async function loadT(){try{TR=await api('/rest/v1/tareas?order=created_at.desc');render();}catch{showEb(1);document.getElementById('tl').innerHTML='<div class="em"><div class="ei">⚠</div><div class="et">No se pudo conectar</div></div>';}}
async function doAdd(){const c=document.getElementById('iC').value.trim(),d=document.getElementById('iD').value.trim();if(!c||!d)return;const b=document.getElementById('ab');b.disabled=true;b.textContent='…';try{const n=await api('/rest/v1/tareas',{method:'POST',body:JSON.stringify({cliente:c,descripcion:d,status:'pending'})});TR.unshift(n[0]);document.getElementById('iC').value='';document.getElementById('iD').value='';b.textContent='Agregar ↵';togF(false);render();flash();}catch{showEb(1);b.disabled=false;b.textContent='Agregar ↵';}}
async function togSt(id){const t=TR.find(x=>x.id===id);if(!t)return;const s=t.status==='done'?'pending':'done';t.status=s;render();try{await api('/rest/v1/tareas?id=eq.'+id,{method:'PATCH',body:JSON.stringify({status:s})});flash();}catch{loadT();}}
async function delT(id){TR=TR.filter(x=>x.id!==id);render();try{await api('/rest/v1/tareas?id=eq.'+id,{method:'DELETE'});flash();}catch{loadT();}}
let FO=false;
function togF(f){FO=f!==undefined?f:!FO;document.getElementById('fw').classList.toggle('op',FO);const b=document.getElementById('tb');b.textContent=FO?'✕ cancelar':'+ Nueva tarea';b.classList.toggle('cx',FO);if(FO)setTimeout(()=>document.getElementById('iC').focus(),80);}
function setF(f){CF=f;['all','pending','done'].forEach(k=>document.getElementById('t-'+k).classList.toggle('on',k===f));render();}
function flash(){const e=document.getElementById('sv');e.classList.add('on');setTimeout(()=>e.classList.remove('on'),1800);}
function showEb(s){document.getElementById('eb').classList.toggle('on',!!s);}
function fd(i){if(!i)return'';return new Date(i).toLocaleDateString('es-CL',{day:'2-digit',month:'2-digit',year:'2-digit'});}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function render(){const fil=CF==='all'?TR:TR.filter(t=>t.status===CF);document.getElementById('n-all').textContent=TR.length;document.getElementById('n-pending').textContent=TR.filter(t=>t.status==='pending').length;document.getElementById('n-done').textContent=TR.filter(t=>t.status==='done').length;const l=document.getElementById('tl');if(!fil.length){const m={all:'Sin tareas — agrega una arriba',pending:'Sin tareas pendientes',done:'Sin tareas completadas'};l.innerHTML='<div class="em"><div class="ei">◻</div><div class="et">'+m[CF]+'</div></div>';return;}l.innerHTML=fil.map(t=>{const co=gc(t.cliente),d=t.status==='done';return'<div class="ti '+(d?'dn':'')+'" style="border-left-color:'+(d?'':co)+'">'+'<button class="ck" onclick="togSt('+t.id+')">'+(d?'✓':'')+'</button>'+'<span class="ct" style="background:'+co+'20;color:'+co+'">'+esc(t.cliente)+'</span>'+'<span class="td">'+esc(t.descripcion)+'</span>'+'<span class="dd">'+fd(t.created_at)+'</span>'+'<button class="dl" onclick="delT('+t.id+')">✕</button></div>';}).join('');}
document.addEventListener('DOMContentLoaded',()=>{
  const wa=!!window.PublicKeyCredential,stored=!!localStorage.getItem(WK);
  if(!wa){document.getElementById('faceBtn').style.display='none';document.getElementById('setupBtn').style.display='none';setMsg('Face ID no disponible. Usa la contraseña.','i');}
  else if(!stored){document.getElementById('faceBtn').style.display='none';setMsg('Sin Face ID registrado — usa contraseña o regístrate.','i');}
  else{document.getElementById('setupBtn').style.display='none';}
  const iC=document.getElementById('iC'),iD=document.getElementById('iD'),ab=document.getElementById('ab');
  const ck=()=>{ab.disabled=!(iC.value.trim()&&iD.value.trim());};
  iC.addEventListener('input',ck);iD.addEventListener('input',ck);
  [iC,iD].forEach(el=>el.addEventListener('keydown',e=>{if(e.key==='Enter')doAdd();}));
  if(isOk())showApp();else showLogin();
});
</script>
</body>
</html>
